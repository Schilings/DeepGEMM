            - paragraph [ref=e5529]: "我们分享在 Kernel 开发过程中的观察和经验, 并向硬件供应商提出一些建议, 希望有助于高效的硬件设计并实现更好的软硬件协同设计:"
            - list [ref=e5530]:
              - listitem [ref=e5531]:
                - generic [ref=e5532]:
                  - strong [ref=e5533]: 计算-通信比.
                  - text: 完全的通信-计算重叠取决于计算-通信比, 而不仅仅是带宽本身. 记峰值计算吞吐量为
                  - img [ref=e5536] [cursor=pointer]
                  - text: ", 互连带宽为"
                  - img [ref=e5543] [cursor=pointer]
                  - text: ", 当"
                  - img [ref=e5550] [cursor=pointer]
                  - text: 时, 通信可以被完全隐藏, 其中
                  - img [ref=e5591] [cursor=pointer]
                  - text: 表示计算量,
                  - img [ref=e5608] [cursor=pointer]
                  - text: 表示通信量. 对于DeepSeek-V4-Pro, 每个token-专家对需要
                  - img [ref=e5625] [cursor=pointer]
                  - text: 的FLOPs( SwiGLU 的 Gate, up/down projection), 但只需要
                  - img [ref=e5636] [cursor=pointer]
                  - text: "字节的通信(FP8分发 + BF16合并), 这可以简化为:"
                  - img [ref=e5645] [cursor=pointer]
                  - text: 也就是说, 每GBps的互连带宽足以隐藏6.1 TFLOP/s计算量所需的通信. 一旦带宽满足这个阈值, 它就不再是瓶颈, 将额外的芯片面积用于进一步增加带宽会带来递减的回报. 作者鼓励未来的硬件设计瞄准这样的平衡点, 而不是无条件地扩展带宽.
              - listitem [ref=e5678]:
                - generic [ref=e5679]:
                  - strong [ref=e5680]: 功率预算.
                  - text: 极致的核融合会同时将计算, 内存和网络推向高负载, 使得功率限制(power throttling)成为一个关键的性能限制因素. 我们建议未来的硬件设计为这种完全并发的工作负载提供足够的功率余量.
              - listitem [ref=e5681]:
                - generic [ref=e5682]:
                  - strong [ref=e5683]: 通信原语.
                  - text: 作者采用一种基于“拉取(pull)”的方法, 每个GPU主动从远程GPU读取数据, 避免了细粒度“推送(push)”所需的高通知延迟. 未来具有更低延迟跨GPU信令的硬件将使推送变得可行, 并能实现更自然的通信模式.
              - listitem [ref=e5684]:
                - generic [ref=e5685]:
                  - strong [ref=e5686]: 激活函数.
                  - text: 作者建议将SwiGLU替换为一个不涉及指数或除法运算的低成本逐元素激活函数. 这直接减轻了GEMM后的处理负担, 并且在相同的参数预算下, 去掉门控投影可以扩大中间维度
                  - img [ref=e5689] [cursor=pointer]
                  - text: ", 进一步放宽对带宽的要求."
