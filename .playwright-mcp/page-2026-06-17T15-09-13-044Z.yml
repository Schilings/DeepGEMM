          - heading "1. Overview" [level=1] [ref=e28]:
            - generic [ref=e29]: 1. Overview
          - paragraph [ref=e30]:
            - generic [ref=e31]:
              - text: MoE可以通过专家并行(EP)进行加速. 然而, EP需要复杂的节点间通信, 并对互连带宽和延迟提出了巨大要求. 为了缓解EP中的通信瓶颈, 并在较低的互连带宽要求下实现更高的端到端性能, DeepSeek团队提出了一种细粒度的EP方案, 该方案将通信和计算融合成一个单一的流水线化核(kernel), 以实现通信与计算的重叠. 关于细粒度的Overlap, 字节也有COMMET这样的工作, 具体可以参考
              - link "《谈谈字节的COMET, 另一个细粒度的MoE通信和计算Overlap方案》" [ref=e32]:
                - /url: https://mp.weixin.qq.com/s?__biz=MzUxNzQ5MTExNw==&mid=2247493369&idx=1&sn=6adc84f2786147b8832cd8377ad24955&scene=21#wechat_redirect
          - heading "1.1 通信延迟隐藏分析" [level=2] [ref=e33]:
            - generic [ref=e34]: 1.1 通信延迟隐藏分析
          - paragraph [ref=e35]: "在MoE层中, 通信延迟可以被有效地隐藏在计算之下. 如图所示, 在DeepSeek-V4系列中, 每个MoE层主要可以分解为四个阶段: 两个通信密集型阶段, 分发(Dispatch)和合并(Combine), 以及两个计算密集型阶段, 线性层-1(Linear-1)和线性层-2(Linear-2)."
          - figure:
            - generic:
              - img "图片"
          - paragraph [ref=e36]: 性能分析显示, 在单个MoE层内, 通信的总时间少于计算的总时间. 因此, 将通信和计算融合成一个统一的流水线后, 计算仍然是主要瓶颈, 这意味着系统可以容忍较低的互连带宽而不会降低端到端性能.
          - heading "1.2 细粒度EP方案" [level=2] [ref=e37]:
            - generic [ref=e38]: 1.2 细粒度EP方案
          - paragraph [ref=e39]: 为了进一步降低互连带宽要求并扩大重叠带来的好处, 作者引入了一种更细粒度的专家划分方案. 受许多相关工作(FlashMoE, COMMET)的启发, 作者将专家分批调度, 称之为“波次(waves)”. 每个波次由一小部分专家组成. 一旦一个波次内的所有专家完成了它们的通信, 计算就可以立即开始, 无需等待其他专家. 在稳定状态下, 当前波次的计算, 下一个波次的token传输, 以及已完成专家的结果发送都同时进行, 如上图所示. 这在专家之间形成了一个细粒度的流水线, 使计算和通信在整个波次处理过程中保持连续. 基于波次的调度提升了在极端情况下的性能, 例如强化学习(RL)的rollout过程, 该过程通常会遇到长尾小批量(long-tail small batches)问题.
          - paragraph [ref=e40]:
            - text: 作者在NVIDIA GPU和HUAWEI Ascend NPU平台上都验证了这种细粒度的EP方案. 与非融合基线相比, 它在通用推理工作负载上实现了1.50 ~ 1.73倍的加速, 在延迟敏感场景(如RL rollout和高速智能体服务)中最高可达1.96倍. 作者已经开源了名为MegaMoE的基于CUDA的MegaKernel实现, 作为DeepGEMM的一个组件, 具体代码可以参考DeepGEMM的
            - code [ref=e41]: pr304
            - text: 和
            - code [ref=e42]: pr316
            - text: .
